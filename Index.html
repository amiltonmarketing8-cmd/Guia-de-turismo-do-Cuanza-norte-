<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuanza Norte AI Tourism</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#071a12,#0b2b1e);
    color:white;
}

header{
    padding:30px;
    text-align:center;
    background:linear-gradient(135deg,#1b4332,#2d6a4f);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#163024;
    padding:18px;
    margin:15px 0;
    border-radius:14px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2d6a4f;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

.ai-box{
    background:#0f3d2e;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    display:none;
    white-space:pre-line;
}

footer{
    text-align:center;
    padding:20px;
    font-size:13px;
    opacity:0.7;
}
</style>
</head>

<body>

<header>
<h1>🌍 Cuanza Norte AI Tourism</h1>
<p>Explora Angola com um guia inteligente</p>
</header>

<div class="container">

<div class="card">
<h2>🤖 Assistente Virtual</h2>
<p>Clica para iniciar a experiência</p>
<button onclick="iniciarIA()">Iniciar guia</button>
<div id="ai" class="ai-box"></div>
</div>

<div class="card">
<h2>🌿 Destinos turísticos</h2>
<p>📍 Ndalatando</p>
<p>⚡ Cambambe</p>
<p>🌊 Rio Kwanza</p>
</div>

</div>

<footer>
© 2026 Cuanza Norte AI Tourism
</footer>

<script>
function iniciarIA(){
    let box = document.getElementById("ai");
    box.style.display = "block";

    box.innerText =
`👋 Olá!

Sou o Assistente do Cuanza Norte AI Tourism.

🌍 Vou guiar-te por Angola.

👉 Explora os destinos abaixo.`;
}
</script>

</body>
</html>
